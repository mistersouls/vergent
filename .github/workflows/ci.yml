name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.base_ref == 'main' ||
      contains(github.event.pull_request.labels.*.name, 'ci/tests')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Sync dev dependencies
        run: uv sync --locked --extra dev

      - name: Check formatting (black)
        run: uv run black --check .

      - name: Lint (ruff - includes McCabe C90)
        run: uv run ruff check .

      - name: Cyclomatic complexity report (radon cc, fail if any block > 10)
        run: uv run radon cc tourillon -n C --total-average -s && uv run radon cc tourillon -n C -s --json | python -c "import sys, json; data=json.load(sys.stdin); blocks=[b for f in data.values() for b in f if b['complexity']>10]; [print(f\"FAIL {b['name']} complexity={b['complexity']}\") for b in blocks]; sys.exit(1 if blocks else 0)"

      - name: Maintainability index (radon mi, fail if any file rated F)
        run: uv run radon mi tourillon -s && uv run radon mi tourillon --json | python -c "import sys, json; data=json.load(sys.stdin); bad=[f for f,v in data.items() if v['rank']=='F']; [print(f\"FAIL {f} MI={v['mi']:.1f}\") for f,v in data.items() if v['rank']=='F']; sys.exit(1 if bad else 0)"

  test:
    name: test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.base_ref == 'main' ||
      contains(github.event.pull_request.labels.*.name, 'ci/tests')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Sync dev dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Publish coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 75

