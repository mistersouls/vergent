[build-system]
requires = ["hatchling>=1"]
build-backend = "hatchling.build"

[project]
name = "tourillon"
version = "0.1.0"
description = "Leaderless peer-to-peer distributed key-value database."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.14"

[project.optional-dependencies]
dev = [
  # formatting
  "black>=24",
  # linting / import sorting / upgrades
  "ruff>=0.9",
  # unused-import / variable removal
  "autoflake>=2",
  # git hooks framework
  "pre-commit>=4",
  # standard hook scripts (trailing-whitespace, end-of-file-fixer, check-yaml, check-toml)
  "pre-commit-hooks>=4.6",
  # testing
  "pytest>=8",
  "pytest-asyncio>=0.24",
  "pytest-cov>=5",
  # complexity analysis
  "radon>=6",
]

[tool.hatch.build.targets.wheel]
packages = ["tourillon"]

# ---------------------------------------------------------------------------
# Black
# ---------------------------------------------------------------------------
[tool.black]
line-length = 88
target-version = ["py313"]   # closest target supported by black; 3.14 tracks 3.13 grammar

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
# E/W = pycodestyle  F = pyflakes  I = isort  N = pep8-naming
# UP = pyupgrade     B = bugbear   SIM = simplify  C90 = mccabe complexity
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM", "C90"]
ignore = [
  "E501",   # line length enforced by black
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.isort]
known-first-party = ["tourillon"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --cov=tourillon --cov-report=term-missing --cov-report=xml --cov-fail-under=90"
asyncio_mode = "auto"
